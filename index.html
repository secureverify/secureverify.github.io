<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação de Idade</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top,#2d2d2d 0%,#121212 45%,#090909 100%);

overflow:hidden;

color:#fff;

}

body:before{

content:"";

position:fixed;

width:500px;
height:500px;

background:#2dd36f22;

border-radius:50%;

filter:blur(140px);

top:-180px;
left:-150px;

animation:float1 8s ease-in-out infinite;

}

body:after{

content:"";

position:fixed;

width:450px;
height:450px;

background:#0066ff18;

border-radius:50%;

filter:blur(140px);

bottom:-200px;
right:-150px;

animation:float2 10s ease-in-out infinite;

}

@keyframes float1{

50%{

transform:translateY(40px);

}

}

@keyframes float2{

50%{

transform:translateY(-40px);

}

}

.card{

position:relative;

width:92%;
max-width:430px;

padding:42px;

border-radius:30px;

background:rgba(28,28,30,.82);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 25px 70px rgba(0,0,0,.55);

text-align:center;

animation:fade .6s ease;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(40px) scale(.96);

}

to{

opacity:1;

transform:none;

}

}

.logo{

width:86px;
height:86px;

margin:auto;

border-radius:24px;

background:linear-gradient(135deg,#ffd54a,#ffb300);

display:flex;
align-items:center;
justify-content:center;

box-shadow:0 10px 35px rgba(255,208,0,.35);

}

.logo svg{

width:44px;

fill:#1c1c1e;

}

h1{

margin-top:28px;

font-size:34px;

font-weight:800;

}

p{

margin-top:18px;

font-size:17px;

line-height:30px;

color:#c5c5c7;

}

.buttons{

display:flex;

gap:14px;

margin-top:38px;

}

button{

flex:1;

height:58px;

border:none;

border-radius:18px;

font-size:17px;

font-weight:700;

cursor:pointer;

transition:.25s;

}

.ok{

background:#20d462;

color:white;

box-shadow:
0 0 30px rgba(32,212,98,.55);

animation:glow 2s infinite;

}

@keyframes glow{

0%{
box-shadow:0 0 10px rgba(32,212,98,.25);
}

50%{
box-shadow:0 0 35px rgba(32,212,98,.8);
}

100%{
box-shadow:0 0 10px rgba(32,212,98,.25);
}

}

.ok:hover{

transform:translateY(-2px);

}

.exit{

background:#303034;

color:#d2d2d2;

}

.exit:hover{

background:#3c3c42;

transform:translateY(-3px);

}

.footer{

margin-top:28px;

font-size:13px;

color:#888;

letter-spacing:1px;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

<svg viewBox="0 0 24 24">

<path d="M12 2L4 5v6c0 5.2 3.4 9.9 8 11 4.6-1.1 8-5.8 8-11V5l-8-3zm-1.2 14.4l-3.3-3.3 1.4-1.4 1.9 1.9 4.8-4.8 1.4 1.4-6.2 6.2z"/>

</svg>

</div>

<h1>Verificação de Idade</h1>

<p>

Este conteúdo é destinado exclusivamente para
<br>
maiores de 18 anos. Ao continuar, você
<br>
confirma ter idade legal.

</p>

<div class="buttons">

<button class="ok"
onclick="window.location.href='https://t.me/SEUGRUPO'">

Tenho +18

</button>

<button class="exit"
onclick="window.location.href='https://t.me/SEUGRUPO'">

Sair

</button>

</div>

<div class="footer">

VERIFICAÇÃO OBRIGATÓRIA

</div>

</div>

</body>
</html>
